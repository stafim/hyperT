name: mockup-sandbox
description: "isolated mockup sandbox for rapid UI prototyping on the canvas"
kind: design

access:
  type: flag
  name: flag-mockup-sandbox-skill
  variation: "true"

service_configs:
  - name: web
    development:
      run: pnpm --filter @workspace/__SLUG__ run dev
    production:
      serve: static
      build:
        - pnpm
        - --filter
        - '@workspace/__SLUG__'
        - run
        - build
      publicDir: artifacts/__SLUG__/dist
      rewrites:
        - from: "/*"
          to: /index.html

initial_open_files: []
